name: Supabase Health Check

on:
  schedule:
    - cron: '0 2 * * *'  # daily at 09:00 ICT (02:00 UTC)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - { ref: elyyijlcjfvhxbpzscnv, name: emr-ai-clinic }
          - { ref: xdafacvqfqkicaxfhwom, name: pharmroo }
          - { ref: tpoiyykbgsgnrdwzgzvn, name: jia-unified }
          - { ref: oijpocbsyqdkorvjylbi, name: roodee }
          - { ref: knxidnzexqehusndquqg, name: morroo }
          - { ref: cxlpazuwsajcjaidzupf, name: jialucksa-crm }
    name: ${{ matrix.project.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run advisor check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ matrix.project.ref }}
          PROJECT_NAME: ${{ matrix.project.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-supabase-advisors.mjs
